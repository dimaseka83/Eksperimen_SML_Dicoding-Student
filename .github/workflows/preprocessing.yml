name: Automated Preprocessing Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  preprocessing:
    name: Run Data Preprocessing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      - name: Run Preprocessing Script
        run: python preprocessing/automate_Dicoding-Student.py

      - name: Verify Output
        run: |
          python -c "
          import pandas as pd
          train = pd.read_csv('heart_disease_preprocessing/train.csv')
          test  = pd.read_csv('heart_disease_preprocessing/test.csv')
          print(f'Train: {train.shape}, Test: {test.shape}')
          assert train.isnull().sum().sum() == 0
          print('Verifikasi lulus!')
          "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: heart_disease_preprocessing
          path: heart_disease_preprocessing/
          retention-days: 30

      - name: Commit Preprocessed Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add heart_disease_preprocessing/
          git diff --staged --quiet || git commit -m "chore: update preprocessed dataset [skip ci]"
          git push || echo "Nothing to push"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}